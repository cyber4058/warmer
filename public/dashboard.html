<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Warmer Pro - Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
        .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <div class="glass rounded-3xl p-8 mb-8 text-center text-white">
            <h1 class="text-5xl font-bold mb-4 flex items-center justify-center gap-4">
                <i class="fas fa-fire text-6xl text-yellow-400"></i>
                WhatsApp Warmer Pro
            </h1>
            <p class="text-xl opacity-90">AI-Powered • Group Link Support • Anti-Ban</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="glass rounded-2xl p-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-2xl font-bold" id="activeSessions">0</p>
                        <p class="text-sm opacity-75">Sessions</p>
                    </div>
                    <i class="fas fa-users text-3xl text-green-400"></i>
                </div>
            </div>
            <div class="glass rounded-2xl p-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-2xl font-bold" id="totalMessages">0</p>
                        <p class="text-sm opacity-75">Messages</p>
                    </div>
                    <i class="fas fa-comments text-3xl text-blue-400"></i>
                </div>
            </div>
            <div class="glass rounded-2xl p-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-2xl font-bold" id="uptime">99.9%</p>
                        <p class="text-sm opacity-75">Uptime</p>
                    </div>
                    <i class="fas fa-clock text-3xl text-purple-400"></i>
                </div>
            </div>
            <div class="glass rounded-2xl p-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-2xl font-bold text-green-400" id="banRisk">LOW</p>
                        <p class="text-sm opacity-75">Ban Risk</p>
                    </div>
                    <i class="fas fa-shield-alt text-3xl text-orange-400"></i>
                </div>
            </div>
        </div>

        <!-- Session Manager -->
        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                <i class="fas fa-mobile-alt"></i> WhatsApp Connection
            </h2>
            <div class="flex gap-3 mb-4">
                <input id="sessionId" placeholder="Session ID (warmer-001)" 
                       class="flex-1 p-3 rounded-xl bg-white/20 text-white placeholder-white/60 border border-white/30">
                <button onclick="connectWA()" class="px-8 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl">
                    <i class="fas fa-qrcode"></i> Connect QR
                </button>
            </div>
            <div id="qrContainer" class="qr-container text-center p-8 bg-black/20 rounded-xl hidden"></div>
            <div id="status" class="p-4 rounded-xl font-bold text-center">❌ Belum Terhubung</div>
        </div>

        <!-- Group Link Manager -->
        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                <i class="fas fa-link"></i> Group Link Manager
            </h2>
            <div class="space-y-4">
                <textarea id="groupLinks" rows="4" 
                    placeholder="Paste WhatsApp group links (one per line):
https://chat.whatsapp.com/ABC123xyz
https://chat.whatsapp.com/DEF456abc"
                    class="w-full p-4 rounded-xl bg-white/20 text-white placeholder-white/60 border border-white/30"></textarea>
                <button onclick="processLinks()" class="w-full p-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl">
                    <i class="fas fa-magic"></i> 🔗 Process Links
                </button>
                <div id="linkResults" class="space-y-2 hidden">
                    <div class="flex justify-between p-3 bg-green-500/20 rounded-xl border border-green-500/30">
                        <span><i class="fas fa-check-circle text-green-400"></i> Valid: <span id="validCount">0</span></span>
                        <span><i class="fas fa-times-circle text-red-400"></i> Invalid: <span id="invalidCount">0</span></span>
                    </div>
                    <div id="processedList" class="max-h-32 overflow-y-auto bg-black/20 p-3 rounded-xl text-sm"></div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-bold text-white mb-6">⚙️ Controls</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="p-4 bg-green-500/20 border border-green-500/30 rounded-xl">
                    <label class="block text-white mb-2">AI Mode</label>
                    <select id="aiMode" class="w-full p-3 rounded-xl bg-white/20 text-white">
                        <option value="human">Human-like</option>
                        <option value="business">Business</option>
                        <option value="casual">Casual</option>
                    </select>
                </div>
                <div>
                    <label class="block text-white mb-2">Reach/Hour</label>
                    <input type="range" id="reachSlider" min="1" max="10" value="3" class="w-full">
                    <span id="reachValue" class="text-white block">3</span>
                </div>
                <div class="p-4 bg-orange-500/20 border border-orange-500/30 rounded-xl">
                    <label class="block text-white mb-2">Ban Protection</label>
                    <select id="banProtection" class="w-full p-3 rounded-xl bg-white/20 text-white">
                        <option value="low">Aggressive</option>
                        <option value="medium">Medium</option>
                        <option value="high">Safe</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-4 mt-6">
                <button id="startBtn" onclick="startWarmer()" class="flex-1 p-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl">
                    ▶️ START WARMER
                </button>
                <button id="stopBtn" onclick="stopWarmer()" class="flex-1 p-4 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl" style="display:none">
                    ⏹️ STOP
                </button>
            </div>
        </div>

        <!-- Logs -->
        <div class="glass rounded-3xl p-6">
            <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                <i class="fas fa-terminal"></i> Live Logs
            </h3>
            <div id="logs" class="h-80 overflow-y-auto bg-black/30 p-4 rounded-2xl text-sm font-mono text-green-400"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentSession = '';
        let isConnected = false;

        socket.on('log', (message) => {
            addLog(message);
        });

        function addLog(message) {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString('id-ID');
            logs.innerHTML += `<div>[${time}] ${message}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        async function connectWA() {
            currentSession = document.getElementById('sessionId').value || 'warmer-001';
            document.getElementById('qrContainer').classList.remove('hidden');
            document.getElementById('qrContainer').innerHTML = '<div class="text-xl">📱 Scan QR Code...<br><small>WhatsApp > Linked Devices > Link Account</small></div>';
            
            const response = await fetch('/api/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId: currentSession})
            });
            
            const result = await response.json();
            if (result.success) {
                document.getElementById('status').innerHTML = '🔄 Menunggu QR Scan...';
                document.getElementById('status').className = 'p-4 rounded-xl font-bold text-center bg-yellow-500/20 border border-yellow-500/30';
            }
        }

        async function processLinks() {
            const links = document.getElementById('groupLinks').value
                .split('\n').map(l => l.trim()).filter(l => l);
            
            if (links.length === 0) return addLog('❌ Masukkan link grup!');
            
            const response = await fetch('/api/groups/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({links, sessionId: currentSession})
            });
            
            const result = await response.json();
            if (result.success) {
                document.getElementById('linkResults').classList.remove('hidden');
                document.getElementById('validCount').textContent = result.valid.length;
                document.getElementById('invalidCount').textContent = result.invalid.length;
            }
        }

        async function startWarmer() {
            const config = {
                aiMode: document.getElementById('aiMode').value,
                banProtection: document.getElementById('banProtection').value,
                reach: document.getElementById('reachSlider').value,
                groupLinks: document.getElementById('groupLinks').value.split('\n').map(l => l.trim()).filter(l => l)
            };
            
            const response = await fetch('/api/start-warmer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId: currentSession, config})
            });
            
            const result = await response.json();
            if (result.success) {
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                addLog('🚀 WARMER DIMULAI!');
            }
        }

        async function stopWarmer() {
            await fetch('/api/stop-warmer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId: currentSession})
            });
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            addLog('⏹️ Warmer dihentikan');
        }

        document.getElementById('reachSlider').addEventListener('input', (e) => {
            document.getElementById('reachValue').textContent = e.target.value;
        });

        // Connection status
        socket.on('connect', () => {
            document.getElementById('status').innerHTML = '✅ Server Connected';
            document.getElementById('status').className = 'p-4 rounded-xl font-bold text-center bg-green-500/20 border border-green-500/30';
        });
    </script>
</body>
</html>
